# Comprehensive GitLab CI fixture for Shipwreck parser tests

default:
  image: python:3.12-slim

variables:
  REGISTRY: "registry.example.com"
  APP_VERSION: "1.0.0"
  DOCKER_DRIVER: overlay2

stages:
  - build
  - test
  - deploy

include:
  - local: '/.gitlab-ci/shared.yml'
  - template: 'Auto-DevOps.gitlab-ci.yml'
  - project: 'my-org/ci-templates'
    file: '/templates/build.yml'

# Hidden/template job — should still be scanned
.docker-base:
  image: docker:24.0-dind
  services:
    - docker:24.0-dind

build-app:
  stage: build
  image: $REGISTRY/ci/builder:1.2.0
  script:
    - docker build -t $REGISTRY/myapp:$APP_VERSION .
    - docker push $REGISTRY/myapp:$APP_VERSION
  services:
    - name: postgres:16
      alias: db

test-unit:
  stage: test
  image:
    name: python:3.11-alpine
    entrypoint: [""]
  script:
    - pytest tests/

deploy-prod:
  stage: deploy
  image: registry.example.com/tools/deployer:latest
  script:
    - docker pull $REGISTRY/myapp:$APP_VERSION
    - ./deploy.sh
  services:
    - docker:24.0-dind
