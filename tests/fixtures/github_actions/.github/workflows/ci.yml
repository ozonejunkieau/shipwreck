# Comprehensive GitHub Actions fixture for Shipwreck parser tests

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Deployment environment
        default: staging

env:
  REGISTRY: registry.example.com
  IMAGE_NAME: myapp

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: registry.example.com/ci/tester:2.0
    services:
      redis:
        image: redis:7
      postgres:
        image: postgres:16
    steps:
      - uses: actions/checkout@v4
      - uses: docker://alpine:3.18
      - name: Run tests
        run: pytest tests/

  build:
    runs-on: ubuntu-latest
    env:
      VERSION: "1.0.0"
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

  deploy:
    runs-on: ubuntu-latest
    container: registry.example.com/tools/deployer:latest
    steps:
      - name: Pull and deploy
        run: |
          docker pull ${{ secrets.PRIVATE_REGISTRY }}/myapp:latest
          docker build -t registry.example.com/myapp:stable .
